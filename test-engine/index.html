
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Booha Test Engine</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#d1d5db;
      --accent:#111827;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    #app{
      max-width:900px;
      margin:0 auto;
      padding:24px;
    }
    .screen{width:100%}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:24px;
      box-shadow:0 6px 20px rgba(0,0,0,.05);
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      gap:16px;
      margin-bottom:16px;
      align-items:flex-start;
    }
    .progress-wrap{
      margin:0 0 16px 0;
    }
    progress{
      width:100%;
      height:14px;
    }
    .field{
      margin:0 0 14px 0;
    }
    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      color:var(--muted);
    }
    input{
      width:100%;
      padding:12px;
      border:1px solid var(--line);
      border-radius:10px;
      font-size:16px;
    }
    button{
      appearance:none;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:12px 16px;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
    }
    button:hover{border-color:#9ca3af}
    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }
    .choices{
      display:grid;
      gap:12px;
      margin:18px 0;
    }
    .choice-btn{
      display:flex;
      align-items:flex-start;
      gap:10px;
      width:100%;
      text-align:left;
      padding:14px 16px;
    }
    .choice-btn.selected{
      border-color:var(--accent);
      background:#f3f4f6;
    }
    .choice-label{
      font-weight:bold;
      min-width:24px;
    }
    .prompt{
      margin:0 0 12px 0;
      line-height:1.45;
    }
    .passage-block{
      white-space:pre-wrap;
      background:#f9fafb;
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      margin-bottom:14px;
      line-height:1.6;
    }
    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
    }
    .nav-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    hr{
      border:none;
      border-top:1px solid var(--line);
      margin:18px 0;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin:10px 0 20px 0;
    }
    th,td{
      border:1px solid var(--line);
      padding:10px;
      text-align:left;
      font-size:14px;
    }
    th{
      background:#f9fafb;
    }
    @media (max-width: 640px){
      #app{padding:14px}
      .card{padding:16px}
      .topbar{flex-direction:column}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="./packs/eiken4_v1.js"></script>
  <script src="./js/events.js"></script>
  <script src="./js/scoring.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/engine.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      try {
        if (!window.TEST_PACK) throw new Error("TEST_PACK not loaded.");
        if (!window.TEST_ENGINE) throw new Error("TEST_ENGINE not loaded.");
        window.TEST_ENGINE.initEngine(window.TEST_PACK);
      } catch (err) {
        const app = document.getElementById("app");
        app.innerHTML = `
          <div class="card">
            <h1>Load Error</h1>
            <p>${String(err.message || err)}</p>
          </div>
        `;
        console.error(err);
      }
    });
  </script>
</body>
</html>
